services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sacredscripture
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/sacredscripture
      FRONTEND_URL: http://localhost:5173
      JWT_SECRET: super-secret-change-me
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_STARTER_PRICE_ID: ${STRIPE_STARTER_PRICE_ID:-}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID:-}
    depends_on:
      - db
    ports:
      - '8000:8000'
    volumes:
      - ./backend/generated_media:/app/generated_media

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  pgdata:
